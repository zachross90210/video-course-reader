services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-course-reader-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4001
      # Inside container, always use /app/courses (the mounted volume location)
      - COURSE_DIR=/app/courses
    volumes:
      # Mount your course directory from host to container
      # Configure the HOST path in .env file: COURSE_DIR=/home/ross/Videos/...
      # This will mount your host directory to /app/courses inside the container
      - ${COURSE_DIR:-./courses}:/app/courses:ro
      # Persist cache and progress files (server writes to /app/.duration-cache.json and /app/.progress.json)
      - ./data/.duration-cache.json:/app/.duration-cache.json
      - ./data/.progress.json:/app/.progress.json
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: video-course-reader-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge
