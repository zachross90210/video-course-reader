<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Course Player</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="title">Course Player</div>
        <div class="totals">
          <span id="totalVideos">0</span> videos • <span id="totalDuration">00:00:00</span> • Watched <span id="watchedDuration">00:00</span> • Left <span id="leftDuration">00:00</span>
        </div>
      </header>
      <main class="layout">
        <section class="player">
          <video id="video" controls playsinline></video>
        </section>
        <aside class="sidebar">
          <div class="sidebar-header">
            <div class="sidebar-title">Contents</div>
            <div class="course-picker">
              <label for="courseSelect">Course:</label>
              <select id="courseSelect" class="course-select"></select>
            </div>
          </div>
          <div id="contents" class="contents"></div>
        </aside>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
  </html>
